<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Pressure Mattress Application Monitoring System - Login</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Orbitron', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #030712;
            background-image: 
                linear-gradient(rgba(0, 240, 255, 0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 240, 255, 0.04) 1px, transparent 1px);
            background-size: 25px 25px;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow: hidden;
            position: relative;
            /* Disable text selection across the page */
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
        }

        /* Ambient scanline background overlay effect */
        body::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        .login-container {
            background: rgba(15, 23, 42, 0.9);
            border: 2px solid #00f0ff;
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 0 40px rgba(0, 240, 255, 0.3), inset 0 0 20px rgba(0, 240, 255, 0.15);
            width: 100%;
            max-width: 440px;
            text-align: center;
            backdrop-filter: blur(12px);
            position: relative;
            z-index: 10;
        }

        /* Cyberpunk corner decorative brackets */
        .login-container::before, .login-container::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            border: 3px solid #00f0ff;
        }
        .login-container::before { top: -2px; left: -2px; border-right: none; border-bottom: none; border-top-left-radius: 8px;}
        .login-container::after { bottom: -2px; right: -2px; border-left: none; border-top: none; border-bottom-right-radius: 8px;}

        .logo-area {
            margin-bottom: 25px;
        }

        .logo-area h1 {
            color: #ffffff;
            font-size: 26px;
            margin-bottom: 8px;
            font-weight: 700;
            letter-spacing: 2px;
            text-shadow: 0 0 12px rgba(0, 240, 255, 0.6);
        }

        .logo-area h2 {
            color: #38bdf8;
            font-size: 11px;
            font-weight: 600;
            line-height: 1.5;
            letter-spacing: 0.5px;
            margin-bottom: 18px;
            text-transform: uppercase;
            opacity: 0.9;
        }

        .system-target {
            display: inline-block;
            background: rgba(0, 240, 255, 0.12);
            border: 1px solid rgba(0, 240, 255, 0.4);
            color: #00f0ff;
            font-size: 18px;
            font-weight: 700;
            padding: 10px 24px;
            border-radius: 20px;
            letter-spacing: 1.5px;
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.3);
        }

        .system-target-sub {
            display: block;
            font-size: 12px; 
            font-weight: 600;
            letter-spacing: 1px;
            opacity: 0.8;
            margin-top: 2px;
        }

        .display-screen {
            background-color: #020617;
            border: 1px solid #1e293b;
            border-left: 4px solid #00f0ff;
            border-radius: 8px;
            height: 60px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            letter-spacing: 12px;
            color: #00f0ff;
            text-shadow: 0 0 15px rgba(0, 240, 255, 0.8);
            box-shadow: inset 0 2px 10px rgba(0, 0, 0, 0.9);
        }

        /* Responsive key grids */
        .pin-panel {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 12px;
        }

        .bottom-action-panel {
            display: grid;
            grid-template-columns: 1.4fr 1fr 1.4fr;
            gap: 12px;
            margin-top: 12px;
        }

        .btn {
            background: linear-gradient(145deg, #1e293b, #0f172a);
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 16px 0;
            font-size: 22px;
            font-weight: 700;
            color: #f8fafc;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            user-select: none;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.4);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .btn:hover {
            background: #1e293b;
            border-color: #00f0ff;
            color: #00f0ff;
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.4);
        }

        .btn:active {
            transform: scale(0.95);
            background: #0f172a;
        }

        .btn.clear {
            background: linear-gradient(145deg, #2d0e0e, #7f1d1d);
            color: #fca5a5;
            border-color: #991b1b;
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .btn.clear:hover {
            background: #991b1b;
            border-color: #ef4444;
            color: #ffffff;
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.5);
        }

        .login-submit {
            background: linear-gradient(90deg, #0284c7, #00f0ff);
            color: #ffffff;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 12px rgba(0, 240, 255, 0.3);
            text-transform: uppercase;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-submit:hover {
            background: linear-gradient(90deg, #00f0ff, #0284c7);
            box-shadow: 0 0 25px rgba(0, 240, 255, 0.7);
        }

        .login-submit:active {
            transform: scale(0.95);
        }

        .message {
            margin-top: 20px;
            font-size: 14px;
            min-height: 22px;
            font-weight: 600;
            letter-spacing: 0.5px;
            line-height: 1.4;
        }
        
        .error {
            color: #f87171;
            text-shadow: 0 0 8px rgba(239, 68, 68, 0.5);
        }

        .success {
            color: #4ade80;
            text-shadow: 0 0 8px rgba(34, 197, 94, 0.5);
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="logo-area">
            <h1>智慧壓力床墊監控系統</h1>
            <h2>Digital Pressure Mattress Application Monitoring System</h2>
            <div class="system-target">
                壓力床墊 3
                <span class="system-target-sub">Pressure Mattress 3</span>
            </div>
        </div>

        <div class="display-screen" id="displayScreen"></div>

        <div class="pin-panel">
            <button class="btn" onclick="appendNumber('1')">1</button>
            <button class="btn" onclick="appendNumber('2')">2</button>
            <button class="btn" onclick="appendNumber('3')">3</button>
            
            <button class="btn" onclick="appendNumber('4')">4</button>
            <button class="btn" onclick="appendNumber('5')">5</button>
            <button class="btn" onclick="appendNumber('6')">6</button>
            
            <button class="btn" onclick="appendNumber('7')">7</button>
            <button class="btn" onclick="appendNumber('8')">8</button>
            <button class="btn" onclick="appendNumber('9')">9</button>
        </div>

        <div class="bottom-action-panel">
            <button class="login-submit" onclick="handleLogin()">Login 登入</button>
            <button class="btn" onclick="appendNumber('0')">0</button>
            <button class="btn clear" onclick="clearDisplay()">Clear 清除</button>
        </div>

        <div class="message" id="messageBox"></div>
    </div>

    <script>
        let currentInput = "";
        const targetSequence = "3506";
        const redirectUrl = "https://docs.google.com/spreadsheets/d/1IzaBiP9sF39UH-kW-xW9GdkmLKtmt1pX8q4NUdPrmTs/edit?gid=199675214#gid=199675214";

        const displayScreen = document.getElementById("displayScreen");
        const messageBox = document.getElementById("messageBox");

        // 1. Disable Right-Click Context Menu
        document.addEventListener('contextmenu', function(e) {
            e.preventDefault();
        }, false);

        // 2. Disable Common Inspection Shortcuts and View-Source Attempts
        document.addEventListener('keydown', function(e) {
            // Disable F12 (Developer Tools)
            if (e.key === 'F12' || e.keyCode === 123) {
                e.preventDefault();
                return false;
            }

            // Disable Ctrl+Shift+I / Cmd+Opt+I (Inspect Element)
            // Disable Ctrl+Shift+J / Cmd+Opt+J (Console)
            // Disable Ctrl+Shift+C / Cmd+Opt+C (Element Selector)
            // Disable Ctrl+U / Cmd+Opt+U (View Source)
            // Disable Ctrl+S / Cmd+S (Save Page As)
            if ((e.ctrlKey || e.metaKey) && 
                (e.shiftKey && (e.key === 'I' || e.key === 'i' || e.key === 'J' || e.key === 'j' || e.key === 'C' || e.key === 'c') ||
                 (e.key === 'U' || e.key === 'u' || e.key === 'S' || e.key === 's'))) {
                e.preventDefault();
                return false;
            }
        }, false);

        function appendNumber(num) {
            if (currentInput.length >= 8) return; 
            
            currentInput += num;
            updateDisplay();
            messageBox.innerText = ""; 
        }

        function updateDisplay() {
            displayScreen.innerText = "•".repeat(currentInput.length);
        }

        function clearDisplay() {
            currentInput = "";
            updateDisplay();
            messageBox.innerText = "";
        }

        function handleLogin() {
            if (currentInput === targetSequence) {
                messageBox.className = "message success";
                messageBox.innerText = "ACCESS GRANTED. 登入成功！正在跳轉...";
                
                setTimeout(() => {
                    window.location.href = redirectUrl;
                }, 800);
            } else {
                messageBox.className = "message error";
                messageBox.innerText = "ACCESS DENIED. 密碼錯誤！密碼已清除。";
                
                // Trigger structural UI alert for incorrect entry before clearing screen
                setTimeout(() => {
                    alert("ERROR: Invalid passcode entered. Please check your credentials and try again.\n錯誤：您輸入的密碼不正確，請重新輸入。");
                    clearDisplay();
                }, 50);
            }
        }
    </script>
</body>
</html>
